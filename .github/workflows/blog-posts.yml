name: Atualizar Perfil com o Blog

on:
  schedule:
    # Roda diariamente às 09h no horário de Brasília/Maceió
    # GitHub Actions usa UTC, então 12:00 UTC = 09:00 no Brasil
    - cron: "0 12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Atualizar o README com posts do RSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Puxar posts do RSS
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://futurododireito.com.br/rss/"
          max_post_count: 50
          template: "$title<br/>$url<br/><br/>"
          date_format: "dd/mm/yyyy"
          commit_message: "Atualiza posts recentes do Futuro do Direito"
